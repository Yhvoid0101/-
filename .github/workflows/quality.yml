name: Codex Quality Gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest PyYAML python-frontmatter coverage hypothesis numpy
      - name: Run tests
        env:
          CODEX_MEMORY_SEMANTIC: disabled
        run: python -m pytest tests -q
